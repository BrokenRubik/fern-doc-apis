openapi: 3.1.0
info:
  title: KLIM Warranty Case RESTlet API - Full Documentation
  version: 1.0.0
tags:
  - name: subpackage_01GetFormOptions
    x-displayName: Get Form Options
  - name: subpackage_02CreateSupportCase
    x-displayName: Create Support Case
  - name: subpackage_03UploadWarrantyImages
    x-displayName: Upload Warranty Images
paths:
  /app/site/hosting/restlet.nl:
    post:
      operationId: get-form-options
      summary: Get Form Options
      description: >-
        Retrieves all form option lists required by the Shopify warranty form.


        The returned country `value` is a numeric `Country.UniqueKey`. The country `code` is provided only as
        informational metadata.
      tags:
        - subpackage_01GetFormOptions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/01 - Get Form Options_Get Form Options_Response_200'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
              required:
                - action
  /app/site/hosting/restlet.nl#postAppSiteHostingRestlet.nl2:
    post:
      operationId: create-case-full-payload
      summary: Create Case - Full Payload
      description: |
        Creates a Support Case using all documented required fields plus the supported optional fields.

        Important implementation details:

        - `countryId` must be the numeric `value` returned by `getFormOptions.countries`.
        - `productTypeId` is saved to `custevent_producttype`; its NetSuite text is also used as the Case title.
        - `customerName` is only needed when a dealer submits on behalf of a customer.
        - `confirmEmail` is optional, but when supplied it must match `email`.
        - `evalPhoto` and `evalPhysical` default to `false` when omitted.
      tags:
        - subpackage_02CreateSupportCase
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/02 - Create Support Case_Create Case - Full Payload_Response_200'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: >-
                    #/components/schemas/AppSiteHostingRestletNlPostAppSiteHostingRestletNl2PostRequestBodyContentApplicationJsonSchemaData
                action:
                  type: string
              required:
                - data
                - action
  /app/site/hosting/restlet.nl#postAppSiteHostingRestlet.nl3:
    post:
      operationId: create-case-required-fields-only
      summary: Create Case - Required Fields Only
      description: >
        Creates a Support Case using only the required fields.


        This example is useful for confirming the minimum Shopify payload accepted by the RESTlet. Optional fields such
        as `customerName`, `confirmEmail`, `poNumber`, `briefDescription`, and the optional checkboxes are omitted.
      tags:
        - subpackage_02CreateSupportCase
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/02 - Create Support Case_Create Case - Required Fields Only_Response_200'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: >-
                    #/components/schemas/AppSiteHostingRestletNlPostAppSiteHostingRestletNl3PostRequestBodyContentApplicationJsonSchemaData
                action:
                  type: string
              required:
                - data
                - action
  /app/site/hosting/restlet.nl#postAppSiteHostingRestlet.nl4:
    post:
      operationId: upload-image
      summary: Upload Image
      description: >
        Uploads one file to an existing Support Case.


        Run `createCase` first and place the returned Case internal ID in the `caseId` collection variable. Call this
        action once per image and increment `imageIndex` from 1 through 10 to populate the corresponding NetSuite Case
        image field.
      tags:
        - subpackage_03UploadWarrantyImages
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/03 - Upload Warranty Images_Upload Image_Response_200'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                base64:
                  type: string
                caseId:
                  type: string
                fileName:
                  type: string
                mimeType:
                  type: string
                imageIndex:
                  type: integer
              required:
                - action
                - base64
                - caseId
                - fileName
                - mimeType
                - imageIndex
